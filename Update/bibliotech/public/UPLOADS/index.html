<<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - BiblioTech</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card text-center p-5">
                    <div class="card-body">
                        <h1 class="mb-4 fs-1">📚 BiblioTech</h1>
                        <h2 class="mb-4">Connexion</h2>
                        <form id="loginForm">
                            <div class="mb-4">
                                <input type="text" class="form-control" id="username" placeholder="👤 Nom d'utilisateur" required>
                            </div>
                            <div class="mb-4">
                                <input type="password" class="form-control" id="password" placeholder="🔒 Mot de passe" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3 fs-5 py-3">
                                🚀 Se connecter
                            </button>
                        </form>
                        <p class="mb-0">
                            Pas encore inscrit ? 
                            <a href="register.html" class="fw-bold text-decoration-none" style="color: #667eea;">Créer un compte</a>
                        </p>
                        <hr class="my-3">
                        <p class="small text-muted fst-italic">
                            <strong>Test Admin:</strong> admin / password
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- JS SPÉCIFIQUE LOGIN -->
    <script src="auth-login.js"></script>
</body>
</html>
