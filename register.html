<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - BiblioTech</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card text-center p-5">
                    <div class="card-body">
                        <h1 class="mb-4 fs-1">📖 BiblioTech</h1>
                        <h2 class="mb-4">Créer un compte</h2>
                        <form id="registerForm">
                            <div class="mb-4">
                                <input type="text" class="form-control" id="username" placeholder="👤 Nom d'utilisateur" required>
                            </div>
                            <div class="mb-4">
                                <input type="password" class="form-control" id="password" placeholder="🔒 Mot de passe (6+ chars)" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 mb-3 fs-5 py-3">
                                ✅ S'inscrire
                            </button>
                        </form>
                        <p class="mb-0">
                            Déjà un compte ? 
                            <a href="index.html" class="fw-bold text-decoration-none" style="color: #667eea;">Se connecter</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- JS SPÉCIFIQUE REGISTER -->
    <script src="auth-register.js"></script>
</body>
</html>
